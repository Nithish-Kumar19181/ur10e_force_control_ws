circle_follow_node:
  ros__parameters:

    # ---- Retract Phase ----
    retract_duration:        2.0      # s — back-off S-curve time
    retract_distance:        0.10     # m — radial inward travel
    move_up_distance:        0.10     # m — vertical lift during retract

    # ---- Approach Phase ----
    approach_distance:       0.35     # m — radial travel toward wall
    approach_duration:       7.0      # s — S-curve approach time

    # ---- Circle Phase ----
    angular_speed:           0.35      # rad/s — nominal angular velocity
    contact_force_threshold: 2.0      # N — |Fz| to declare contact during APPROACH
    desired_circle_force:   -10.0     # N — target contact force
    max_angle_rad:           6.2832   # rad — arc per circle (2π = one full 360°)
    circle_ramp_fraction:    0.10     # fraction of the arc used for each speed ramp
    min_speed_fraction:      0.15     # speed floor so the ramp-down completes the arc

    # ---- Force PI Controller (radius adaptation) ----
    kp_radius:               0.5      # m/(N·s) — proportional gain
    ki_radius:               0.005    # m/N     — integral gain
    integral_limit:          2.0      # N·s     — anti-windup clamp
    max_radius_rate:         0.01     # m/s     — max radius change per second

    # ---- Target Wrench ----
    approach_force_z:       -5.0      # N — Fz setpoint during APPROACH
    circle_force_z:         -3.0      # N — constant compliance Fz bias during CIRCLE
